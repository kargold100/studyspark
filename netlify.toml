# Netlify configuration for StudySpark
# Drop this folder at netlify.com/drop OR connect your GitHub repo

[build]
  publish = "."
  functions = "netlify/functions"

# NOTE: there is intentionally no catch-all "/*  →  /index.html" redirect here.
# StudySpark is a single index.html page with no real URL-based routing (it
# switches screens purely via JavaScript state, the URL never changes), so
# that rule was never actually needed — and it was silently intercepting
# every request to /.netlify/functions/* and serving index.html instead,
# which is why the AI proxy never worked no matter how it was configured.
# If you ever DO add real client-side routes later, scope any redirect
# narrowly (e.g. "/app/*") rather than using "/*", so it can never shadow
# /.netlify/functions/* again.

# Security and performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# index.html must always be fetched fresh — it contains the ?v= version
# pointers for every other file. If THIS gets cached, updates never reach
# visitors no matter how the other files are cached below.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Cache question bank and assets aggressively — safe to do, since each file
# is requested with a ?v= version query string in index.html. A new deploy
# that bumps the version is a brand-new URL the browser has never cached,
# so it's always fetched fresh regardless of the long max-age below.
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
