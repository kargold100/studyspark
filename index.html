<div class="hdr">
  <span class="logo" onclick="App.home()">🎓 StudySpark</span>
  <div class="nav" id="nav-bar"></div>
</div>
<div id="app">
  <div class="loading">
    <span class="spin" style="font-size:32px">⏳</span>
    <div style="margin-top:12px;font-weight:700">Loading StudySpark...</div>
    <div class="mt sm" style="margin-top:6px">63600+ questions · Personalised profiles · AI coaching</div>
  </div>
</div>
<script>
  // Safety net: if the app hasn't replaced this loading screen within 10s,
  // something failed to load (often a stale cached file after an update).
  // Offer a one-click hard reload instead of leaving people on a stuck spinner.
  setTimeout(function(){
    var loadingEl = document.querySelector('#app .loading');
    if (loadingEl) {
      loadingEl.innerHTML =
        '<div style="font-size:32px">⚠️</div>' +
        '<div style="margin-top:12px;font-weight:700">Taking longer than expected</div>' +
        '<div class="mt sm" style="margin-top:6px;max-width:320px;margin-left:auto;margin-right:auto">' +
        'Your browser may be holding onto an old cached version. Try a hard refresh:</div>' +
        '<button class="btn ba" style="margin-top:14px" onclick="location.reload(true)">🔄 Reload Now</button>';
    }
  }, 10000);
</script>
<div style="text-align:center;padding:14px 16px 22px;color:var(--muted);font-size:11px;line-height:1.6;opacity:.85">
  StudySpark v1.0 — For learning and practice purposes only. Questions are original, sample-style practice material and are not an official or guaranteed exam preparation resource.
